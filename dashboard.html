<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>

<!-- Navigation bar -->

    <a href="add.html">Add Transaction</a>
    <a href="transactions.html">View Transactions</a>

<!-- Main dashboard card -->

<!-- Auth logic -->
<script src="js/auth.js"></script>

        alert("Please login first");
        window.location.href = "index.html";
    }
</script>
